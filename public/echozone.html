



<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Echozone</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>

/* =========================
   BODY + BACKGROUND
========================= */

body{
margin:0;
font-family: 'Segoe UI', Arial;
height:100vh;
background:
radial-gradient(circle at 20% 30%, #111, #000);
color:white;
overflow-x:hidden;
}

/* Echozone Title Style */

h1 {

font-family:'Orbitron', sans-serif;

font-size: 72px;

letter-spacing: 8px;

font-weight:600;

text-shadow:
0 0 10px rgba(0,240,255,0.6),
0 0 20px rgba(255,0,255,0.4);

}

/* Floating particles */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background-image:
radial-gradient(#ffd700 1px, transparent 1px);
background-size:40px 40px;
opacity:0.15;
animation:moveParticles 30s linear infinite;
z-index:-1;
}

@keyframes moveParticles{
0%{transform:translate(0,0);}
100%{transform:translate(-600px,600px);}
}

/* =========================
   LANDING PAGE
========================= */

.echo-core{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

/* Title */

h1{
font-size:55px;
margin:10px;

background:linear-gradient(
90deg,
#ffd700,
#ff9900,
#00ffff,
#ff00ff,
#ffd700
);

background-size:300%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:titleFlow 6s linear infinite;
}

@keyframes titleFlow{
0%{background-position:0%;}
100%{background-position:300%;}
}

/* Big Landing Tagline */

.tagline{
font-size:18px;
opacity:0.8;
margin-bottom:20px;
}

/* Button */

button{
padding:12px 28px;
border:none;
border-radius:30px;

font-size:16px;
font-weight:bold;

background:linear-gradient(
90deg,
#ffd700,
#ff9900
);

color:black;

cursor:pointer;

transition:0.3s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 15px #ffd700;
}

/* =========================
   APP PAGE
========================= */

#appPage{
display:none;
padding:20px;
}

/* Small moving tagline */

.moving-tagline{
width:100%;
overflow:hidden;
height:40px;
margin-bottom:20px;
position:relative;
}

.moving-tagline span{

position:absolute;

white-space:nowrap;

font-size:22px;
font-weight:bold;

background:linear-gradient(
90deg,
#ffd700,
#00ffff,
#ff00ff,
#ffd700
);

background-size:300%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:
moveText 12s linear infinite,
colorShift 6s linear infinite;
}

@keyframes moveText{
0%{transform:translateX(100%);}
100%{transform:translateX(-100%);}
}

@keyframes colorShift{
0%{background-position:0%;}
100%{background-position:300%;}
}

/* =========================
   POST BOX
========================= */

.post-container{

background:rgba(255,255,255,0.05);

backdrop-filter:blur(10px);

border-radius:15px;

padding:15px;

margin-bottom:20px;

box-shadow:0 0 15px rgba(255,255,255,0.1);
}

/* Textarea */

textarea{

width:100%;
height:70px;

background:rgba(0,0,0,0.5);

border:none;

border-radius:10px;

padding:10px;

color:white;

font-size:14px;

resize:none;

outline:none;
}

/* =========================
   POSTS
========================= */

.post{

background:rgba(255,255,255,0.05);

border-radius:15px;

padding:12px;

margin-bottom:12px;

animation:fadeIn 0.4s ease;

position:relative;

box-shadow:0 0 12px rgba(0,0,0,0.6);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Delete button */

.delete-btn{

position:absolute;
right:10px;
top:10px;

background:red;
color:white;

border:none;

padding:5px 10px;

border-radius:20px;

cursor:pointer;
}

/* Distance Badge */

.distance{

font-size:12px;

opacity:0.7;

margin-top:5px;
}

/* Timestamp */

.time{

font-size:11px;

opacity:0.5;
}

/* =========================
   MOBILE SUPPORT
========================= */

@media(max-width:600px){

h1{
font-size:40px;
}

textarea{
height:60px;
}

}

/* CINEMATIC SCROLL TAGLINE */

.tagline-container {

width:100%;
overflow:hidden;

margin-top:30px;
margin-bottom:25px;

}

.tagline {

display:inline-block;

white-space:nowrap;

font-size:44px;
font-weight:300;
font-family:'Montserrat', sans-serif;
opacity:0.55;
letter-spacing:5px;

padding-left:100%;

background:linear-gradient(
90deg,
#00f0ff,
#ff00ff,
#00ff88,
#00f0ff
);

background-size:300%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:
scrollTagline 24s linear infinite,
glowColors 6s linear infinite;

}

@keyframes scrollTagline {

from {
transform: translateX(0%);
}

to {
transform: translateX(-100%);
}

}

@keyframes glowColors {

0% {
background-position:0%;
}

100% {
background-position:300%;
}

}



</style>
</head>

<body>

<!-- =========================
     LANDING PAGE
========================= -->

<div class="echo-core" id="landing">

<h1>Echozone</h1>

<div class="tagline-container">

<div class="tagline">

EchoZone — Where Voices Travel Without Names • Ask Nearby • Share Freely • Stay Anonymous • Discover the Echo Around You 

</div>

</div>

<button onclick="openApp()">
Enter Echozone
</button>

</div>

<!-- =========================
     APP PAGE
========================= -->

<div id="appPage">

<h1>Echozone</h1>

<div class="moving-tagline">
<span>
Ask Something Nearby • Share Updates • Stay Connected •
</span>
</div>

<div class="post-container">

<textarea
id="text"
placeholder="Ask something nearby..."
></textarea>

<br><br>

<button onclick="createPost()">
Post
</button>

</div>

<div id="posts"></div>

</div>

<script>

/* =========================
   OPEN APP
========================= */

function openApp(){

document.getElementById("landing").style.display="none";

document.getElementById("appPage").style.display="block";

}

/* =========================
   CREATE POST
========================= */

function createPost(){

let text=document.getElementById("text").value;

if(text.trim()=="") return;

/* Fake distance generator */

let distance=Math.floor(
Math.random()*50
)+1;

/* Timestamp */

let time=new Date().toLocaleTimeString();

/* Create Post */

let post=document.createElement("div");

post.className="post";

post.innerHTML=`

${text}

<div class="distance">

📍 ${distance} km away

</div>

<div class="time">

${time}

</div>

<button class="delete-btn"
onclick="this.parentElement.remove()">

Delete

</button>

`;

document
.getElementById("posts")
.prepend(post);

document.getElementById("text").value="";

}

/* =========================
   AUTO DEMO POSTS
========================= */

window.onload=function(){

let demoPosts=[

"Anyone nearby hospital?",
"Power outage in my street",
"Lost dog spotted",
"Need water supply info"

];

demoPosts.forEach(msg=>{

document.getElementById("text").value=msg;

createPost();

});

document.getElementById("text").value="";

}

</script>

</body>
</html>
