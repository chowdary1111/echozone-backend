<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Echozone</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    overflow: hidden;
}

/* BACKGROUND ANIMATION */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* CENTER */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 1;
}

/* GLOW TITLE */
.glow {
    font-size: 65px;
    color: #facc15;
    animation: glowAnim 2s infinite alternate;
}

@keyframes glowAnim {
    from { text-shadow: 0 0 10px #facc15; }
    to { text-shadow: 0 0 30px #f59e0b, 0 0 60px #facc15; }
}

/* TAGLINE */
.tagline span {
    display: block;
    font-size: 18px;
    margin-top: 5px;
    animation: colorChange 3s infinite;
}

.tagline span:nth-child(1){animation-delay:0s;}
.tagline span:nth-child(2){animation-delay:1s;}
.tagline span:nth-child(3){animation-delay:2s;}

@keyframes colorChange {
    0% { color: #38bdf8; }
    50% { color: #facc15; }
    100% { color: #22c55e; }
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg, #facc15, #f59e0b);
    color: black;
    font-weight: bold;
    cursor: pointer;
}

/* INPUTS */
textarea, input {
    margin-top: 10px;
    padding: 10px;
    width: 260px;
    border-radius: 10px;
    border: none;
}

/* POSTS */
.post {
    margin-top: 10px;
    padding: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
}

/* HIDE APP */
#appPage {
    display: none;
}
</style>

</head>

<body>

<canvas id="bg"></canvas>

<!-- LANDING PAGE -->

<div id="landing" class="center">
    <h1 class="glow">Echozone</h1>

```
<div class="tagline">
    <span>Your Voice.</span>
    <span>Your Zone.</span>
    <span>Your Safety.</span>
</div>

<button onclick="openApp()">Enter Echozone</button>
```

</div>

<!-- APP PAGE -->

<div id="appPage" class="center">
    <h1 class="glow">Echozone</h1>

```
<textarea id="text" placeholder="Ask something nearby..."></textarea><br>
<input id="location" placeholder="Enter location"><br>

<button onclick="sendPost()">Post</button>

<div id="posts"></div>
```

</div>

<script>

/* ===== BACKGROUND STARS ===== */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 120; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2
    });
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "white";

    stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
        ctx.fill();

        s.y += 0.3;
        if (s.y > canvas.height) s.y = 0;
    });

    requestAnimationFrame(animate);
}
animate();

/* ===== NAVIGATION ===== */
function openApp() {
    document.getElementById("landing").style.display = "none";
    document.getElementById("appPage").style.display = "block";
    loadPosts();
}

/* AUTO LOCATION */
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        pos => {
            document.getElementById("location").value =
                pos.coords.latitude.toFixed(2) + ", " + pos.coords.longitude.toFixed(2);
        }
    );
}

/* SEND POST */
async function sendPost() {
    const text = document.getElementById("text").value;
    const location = document.getElementById("location").value;

    if (!text) return alert("Write something!");

    await fetch("https://echozone-3ztl.onrender.com/posts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, location })
    });

    document.getElementById("text").value = "";
    loadPosts();
}

/* LOAD POSTS */
async function loadPosts() {
    try {
        const res = await fetch("https://echozone-3ztl.onrender.com/posts");
        const posts = await res.json();

        const container = document.getElementById("posts");
        container.innerHTML = "";

        posts.forEach(p => {
            const div = document.createElement("div");
            div.className = "post";
            div.innerText = p.text + " - " + p.location;

            const btn = document.createElement("button");
            btn.innerText = "Delete";
            btn.onclick = () => deletePost(p._id);

            div.appendChild(btn);
            container.appendChild(div);
        });

    } catch (err) {
        console.log("Backend sleeping...");
    }
}

/* DELETE POST */
async function deletePost(id) {
    await fetch("https://echozone-3ztl.onrender.com/posts/" + id, {
        method: "DELETE"
    });

    loadPosts();
}

</script>

</body>
</html>
