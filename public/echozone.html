<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Echozone</title>

<style>

/* BODY */

body{
margin:0;
height:100vh;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#000000,#111,#000000);
overflow:hidden;
color:white;
}

/* GOLD PARTICLES BACKGROUND */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:radial-gradient(circle,#d4af37 1px, transparent 1px);
background-size:40px 40px;
animation:particleMove 30s linear infinite;
opacity:0.3;
}

@keyframes particleMove{
0%{transform:translate(0,0)}
100%{transform:translate(-600px,-600px)}
}

/* BIG MOVING TAGLINE */

.tagline{
position:absolute;
top:40%;
white-space:nowrap;
font-size:120px;
font-weight:900;
opacity:0.25;

background:linear-gradient(
90deg,
red,
orange,
yellow,
green,
cyan,
blue,
violet
);

background-size:400%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:
rainbowFlow 8s linear infinite,
moveText 20s linear infinite;
}

/* COLOR FLOW */

@keyframes rainbowFlow{
0%{background-position:0%}
100%{background-position:400%}
}

/* TEXT MOVEMENT */

@keyframes moveText{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* CENTER CONTENT */

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

/* TITLE */

h1{
font-size:60px;
color:#d4af37;
margin:0;
}

/* SUBTITLE */

p{
font-size:22px;
opacity:0.8;
margin-top:10px;
}

/* BUTTON */

button{
margin-top:30px;
padding:15px 40px;
font-size:18px;
border:none;
border-radius:30px;
background:#d4af37;
color:black;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 25px gold;
}

/* SECOND PAGE */

#appPage{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

input,textarea{
padding:10px;
margin-top:10px;
width:250px;
border:none;
border-radius:6px;
}

#posts{
margin-top:20px;
max-height:200px;
overflow:auto;
}

.post{
background:#111;
padding:10px;
margin-top:10px;
border-left:4px solid gold;
}

</style>

</head>

<body>

<!-- LANDING PAGE -->

<div id="landing">

<div class="tagline">
Your Voice. Your Zone. Your Safety.
</div>

<div class="center">

<h1>Echozone</h1>

<p>Ask. Connect. Stay Safe Nearby.</p>

<button onclick="openApp()">Enter Echozone</button>

</div>

</div>


<!-- APP PAGE -->

<div id="appPage" style="display:none;">

<h1>Echozone</h1>

<textarea id="text" placeholder="Ask something nearby..."></textarea><br>

<input id="location" placeholder="Enter location"><br>

<button onclick="sendPost()">Post</button>

<div id="posts"></div>

</div>


<script>

/* OPEN SECOND PAGE */

function openApp(){

document.getElementById("landing").style.display="none"
document.getElementById("appPage").style.display="block"

loadPosts();

}

/* SEND POST TO BACKEND */

async function sendPost(){

const text=document.getElementById("text").value
const location=document.getElementById("location").value

await fetch("https://echozone-3ztl.onrender.com/posts", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
text:text,
location:location
})

})

loadPosts()

}
async function deletePost(id){
   await fetch(https://echozone-3ztl.onrender.com/posts/" + id, {
method:"DELETE"
})
loadPosts()
}

/* LOAD POSTS FROM SERVER */


async function loadPosts(){
  const res = await fetch("https://echozone-3ztl.onrender.com/posts");
  const posts = await res.json();

  const container = document.getElementById("posts");
  container.innerHTML = "";

  posts.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    const text = document.createElement("p");
    text.innerText = p.text + " - " + p.location;

    const btn = document.createElement("button");
    btn.innerText = "Delete";
    btn.onclick = () => deletePost(p._id);

    div.appendChild(text);
    div.appendChild(btn);

    container.appendChild(div);
  });
}
</script>

</body>
</html>
