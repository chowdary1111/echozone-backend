<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Echozone</title>

<style>

/* BODY */
body{
margin:0;
height:100vh;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#000000,#111,#000000);
overflow:hidden;
color:white;
}

/* GOLD PARTICLES */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:radial-gradient(circle,#d4af37 1px,transparent 1px);
background-size:40px 40px;
animation:particleMove 25s linear infinite;
opacity:0.25;
}

@keyframes particleMove{
0%{transform:translate(0,0)}
100%{transform:translate(-600px,600px)}
}

/* BIG TAGLINE */
.tagline{
position:absolute;
top:40%;
white-space:nowrap;
font-size:120px;
font-weight:900;
opacity:0.35;

background:linear-gradient(
90deg,
red, orange, yellow, green, cyan, blue, violet
);

background-size:400%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:
rainbowFlow 8s linear infinite,
moveText 20s linear infinite;
}

@keyframes rainbowFlow{
0%{background-position:0%}
100%{background-position:400%}
}

@keyframes moveText{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* CENTER */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

/* TITLE */
h1{
font-size:60px;
color:#d4af37;
margin:0;
}

/* SUBTITLE */
p{
font-size:22px;
opacity:0.8;
margin-top:10px;
}

/* BUTTON */
button{
margin-top:30px;
padding:15px 40px;
font-size:18px;
border:none;
border-radius:30px;
background:#d4af37;
color:black;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 25px gold;
}

/* SECOND PAGE */
#appPage{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

input,textarea{
padding:10px;
margin-top:10px;
width:250px;
border:none;
border-radius:6px;
}

/* POSTS */
#posts{
margin-top:20px;
max-height:200px;
overflow:auto;
}

.post{
background:#111;
padding:10px;
margin-top:10px;
border-left:4px solid gold;
}

.post button{
margin-left:10px;
padding:5px 10px;
font-size:12px;
}

</style>
</head>

<body>

<!-- TAGLINE BACKGROUND -->
<div class="tagline">
Your Voice. Your Zone. Your Safety.
</div>

<!-- LANDING PAGE -->
<div id="landing">
<div class="center">

<h1>Echozone</h1>
<p>Ask. Connect. Stay Safe Nearby.</p>

<button onclick="openApp()">Enter Echozone</button>

</div>
</div>

<!-- APP PAGE -->
<div id="appPage" style="display:none;">

<h1>Echozone</h1>

<textarea id="text" placeholder="Ask something nearby..."></textarea>

<button onclick="addPost()">Post</button>

<div id="posts"></div>

</div>

<script src="script.js"></script>
</body>
</html>
