<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detection & Matching | Echozone</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --happy: #facc15;
            --sad: #60a5fa;
            --angry: #f87171;
            --stress: #c084fc;
            --neutral: #94a3b8;
            --critical: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }

        .container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--accent-primary), transparent, var(--stress));
            z-index: -1;
            border-radius: 26px;
            opacity: 0.3;
            animation: borderGlow 6s linear infinite;
        }

        @keyframes borderGlow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 32px;
            font-size: 1.1rem;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dim);
            font-weight: 500;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--accent-primary);
            color: var(--bg-color);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(56, 189, 248, 0.5);
            background: #7dd3fc;
        }

        .btn:active {
            transform: translateY(0);
        }

        .results {
            margin-top: 32px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .results.active {
            opacity: 1;
            transform: translateY(0);
        }

        .result-card {
            background: rgba(15, 23, 42, 0.4);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .emotion-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 8px;
            text-transform: capitalize;
        }

        /* Dynamic Colors for Emotions */
        .color-happy { background: rgba(250, 204, 21, 0.2); color: var(--happy); border: 1px solid var(--happy); }
        .color-sad { background: rgba(96, 165, 250, 0.2); color: var(--sad); border: 1px solid var(--sad); }
        .color-angry { background: rgba(248, 113, 113, 0.2); color: var(--angry); border: 1px solid var(--angry); }
        .color-stress { background: rgba(192, 132, 252, 0.2); color: var(--stress); border: 1px solid var(--stress); }
        .color-neutral { background: rgba(148, 163, 184, 0.2); color: var(--neutral); border: 1px solid var(--neutral); }
        .color-critical { background: rgba(239, 68, 68, 0.2); color: var(--critical); border: 1px solid var(--critical); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Echozone AI</h1>
        <p class="subtitle">Emotion Detection & Matching Demo</p>

        <div class="input-group">
            <label for="userId">Your Unique ID</label>
            <input type="text" id="userId" readonly placeholder="Generating ID...">
        </div>

        <div class="input-group">
            <label for="message">How are you feeling today?</label>
            <textarea id="message" rows="4" placeholder="Type a message to analyze your emotion..."></textarea>
        </div>

        <button class="btn" id="analyzeBtn" onclick="analyzeEmotion()">
            <span class="loader" id="loader"></span>
            Analyze & Find Match
        </button>

        <div class="results" id="results">
            <div class="result-card">
                <div class="result-label">Detected Emotion</div>
                <div id="emotionResult" class="emotion-badge color-neutral">Waiting...</div>
            </div>
            <div class="result-card">
                <div class="result-label">Potential Match</div>
                <div id="matchResult" class="result-value">Searching...</div>
            </div>
        </div>

        <div class="info-section">
            <p>💡 <b>How to test matching:</b> Open this page in a <b>new private window</b> or another browser tab. The system will detect your emotions and match you with another active user in the store!</p>
        </div>
    </div>

    <style>
        .info-section {
            margin-top: 24px;
            padding: 16px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 12px;
            border: 1px dashed var(--accent-primary);
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.4;
        }
        input[readonly] {
            cursor: not-allowed;
            opacity: 0.7;
            background: rgba(15, 23, 42, 0.8);
        }
    </style>

    <script>
        // Generate random ID on load
        window.onload = () => {
            const randomId = 'user_' + Math.random().toString(36).substr(2, 6).toUpperCase();
            document.getElementById('userId').value = randomId;
        };

        async function analyzeEmotion() {
            const userId = document.getElementById('userId').value;
            const message = document.getElementById('message').value;
            const btn = document.getElementById('analyzeBtn');
            const loader = document.getElementById('loader');
            const resultsDiv = document.getElementById('results');
            const emotionBadge = document.getElementById('emotionResult');
            const matchResult = document.getElementById('matchResult');

            if (!userId || !message) {
                alert("Please fill in both fields.");
                return;
            }

            // UI State
            loader.style.display = 'inline-block';
            btn.disabled = true;
            resultsDiv.classList.remove('active');

            try {
                const response = await fetch('/api/emotion/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, message })
                });

                const data = await response.json();

                if (response.ok) {
                    // Update Emotion Badge
                    emotionBadge.innerText = data.emotion;
                    emotionBadge.className = `emotion-badge color-${data.emotion}`;
                    
                    // Update Match Result
                    matchResult.innerText = data.matchUserId ? data.matchUserId : "No match found";
                    matchResult.style.color = data.matchUserId ? "var(--stress)" : "var(--text-dim)";

                    resultsDiv.classList.add('active');
                } else {
                    alert("Error: " + (data.error || "Internal Server Error"));
                }
            } catch (err) {
                console.error(err);
                alert("Connection failed. Is the server running?");
            } finally {
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
