<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoZone Emergency</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Space+Grotesk:wght@600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3a8a, #4a0000, #1e3a8a);
      animation: bgFlash 2.2s ease-in-out infinite alternate;
      position: relative;
    }

    /* Continuous red-blue flashing background */
    @keyframes bgFlash {
      0%   { background-color: #1e3a8a; }
      100% { background-color: #4a0000; }
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 25% 30%, rgba(59, 130, 246, 0.25) 0%, transparent 60%),
                  radial-gradient(circle at 75% 70%, rgba(236, 72, 153, 0.25) 0%, transparent 60%);
      animation: floatOrbs 28s linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes floatOrbs {
      0%   { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(40px, -40px) rotate(360deg); }
    }

    .container {
      width: 100%;
      max-width: 920px;
      text-align: center;
      padding: 50px 30px;
      border-radius: 50px;
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(24px);
      box-shadow: 0 0 90px rgba(147, 51, 234, 0.45), 0 30px 60px -15px rgba(0,0,0,0.7);
      z-index: 2;
      animation: floatContainer 7s ease-in-out infinite;
    }

    @keyframes floatContainer {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50%      { transform: translateY(-22px) rotate(1deg); }
    }

    .header {
      margin-bottom: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 25px;
      animation: floatHeader 4s ease-in-out infinite;
    }

    @keyframes floatHeader {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }

    .siren {
      font-size: 62px;
      filter: drop-shadow(0 0 30px #f43f5e);
      animation: sirenBob 2.8s ease-in-out infinite;
    }

    @keyframes sirenBob {
      0%, 100% { transform: scale(1) rotate(-6deg); }
      50%      { transform: scale(1.08) rotate(6deg); }
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -1.5px;
      background: linear-gradient(90deg, #60a5fa, #c026d3, #f43f5e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .instruction {
      font-size: 21px;
      font-weight: 500;
      margin-bottom: 65px;
      opacity: 0.92;
    }

    .hold-wrapper {
      position: relative;
      width: 235px;
      height: 235px;
      margin: 0 auto 75px;
      animation: floatHold 5s ease-in-out infinite;
    }

    @keyframes floatHold {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-28px) rotate(4deg); }
    }

    /* HOLD button with automatic color cycling */
    .hold-circle {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 37px;
      font-weight: 700;
      letter-spacing: -1.2px;
      color: #f1f5f9;
      cursor: pointer;
      user-select: none;
      box-shadow: 
        0 0 75px rgba(0,0,0,0.6),
        inset 0 28px 45px rgba(255,255,255,0.22),
        inset 0 -28px 45px rgba(0,0,0,0.65);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2;
      position: relative;
      overflow: hidden;
      animation: colorCycle 4s linear infinite; /* Green ↔ Violet when idle */
    }

    @keyframes colorCycle {
      0%   { background: linear-gradient(135deg, #10b981, #6b21a8); }
      50%  { background: linear-gradient(135deg, #6b21a8, #10b981); }
      100% { background: linear-gradient(135deg, #10b981, #6b21a8); }
    }

    .hold-circle::before {
      content: '';
      position: absolute;
      inset: -50%;
      background: radial-gradient(circle at 35% 25%, rgba(255,255,255,0.35), transparent 60%);
      opacity: 0.7;
    }

    /* When pressing → Red */
    .hold-circle:active {
      animation: none;
      background: linear-gradient(135deg, #ef4444, #b91c1c) !important;
      transform: scale(0.84) translateY(6px);
      box-shadow: 0 0 65px rgba(239, 68, 68, 0.95);
    }

    .hold-circle:active::before {
      opacity: 1;
      transform: scale(1.1);
    }

    .haptic-icon {
      position: absolute;
      bottom: -52px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 30px;
      opacity: 0.9;
      animation: hapticFloat 2s ease-in-out infinite;
      z-index: 3;
    }

    @keyframes hapticFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(-8px); }
    }

    .stop-btn {
      padding: 17px 46px;
      font-size: 17.5px;
      font-weight: 700;
      background: linear-gradient(90deg, #e11d48, #f43f5e);
      color: white;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 18px 35px -8px rgba(225, 29, 72, 0.55);
      transition: all 0.3s;
    }

    .stop-btn:hover {
      transform: translateY(-3px);
    }

    .back-btn {
      position: absolute;
      top: 35px;
      left: 40px;
      background: rgba(255,255,255,0.13);
      border: none;
      color: white;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 16px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      z-index: 10;
    }
  </style>
</head>
<body>

  <button class="back-btn" onclick="history.back()">← Back</button>

  <div class="container">
    <div class="header">
      <span class="siren">🚨</span>
      <h1>EMERGENCY MODE</h1>
      <span class="siren">🚨</span>
    </div>

    <div class="instruction">
      Hold the circle to activate emergency
    </div>

    <div class="hold-wrapper">
      <div id="holdCircle" class="hold-circle">
        HOLD
      </div>
      <div class="haptic-icon">📳</div>
    </div>

    <button id="stopAlarm" class="stop-btn">
      STOP ALARM
    </button>
  </div>

  <!-- Your audio.mp3 is connected here -->
  <audio id="emergencySound" src="audio.mp3" preload="auto"></audio>

  <script src="emergency.js"></script>
</body>
</html>
