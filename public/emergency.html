<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoZone Emergency</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Space+Grotesk:wght@600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3a8a, #4a0000, #1e3a8a);
      animation: bgFlash 2.2s ease-in-out infinite alternate;
      position: relative;
    }

    /* Continuous red-blue flashing background */
    @keyframes bgFlash {
      0% {
        background-color: #1e3a8a;
      }

      100% {
        background-color: #4a0000;
      }
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 25% 30%, rgba(59, 130, 246, 0.25) 0%, transparent 60%),
        radial-gradient(circle at 75% 70%, rgba(236, 72, 153, 0.25) 0%, transparent 60%);
      animation: floatOrbs 28s linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes floatOrbs {
      0% {
        transform: translate(0, 0) rotate(0deg);
      }

      100% {
        transform: translate(40px, -40px) rotate(360deg);
      }
    }

    .container {
      width: 100%;
      max-width: 920px;
      text-align: center;
      padding: 50px 30px;
      border-radius: 50px;
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(24px);
      box-shadow: 0 0 90px rgba(147, 51, 234, 0.45), 0 30px 60px -15px rgba(0, 0, 0, 0.7);
      z-index: 2;
      animation: floatContainer 7s ease-in-out infinite;
    }

    @keyframes floatContainer {

      0%,
      100% {
        transform: translateY(0px) rotate(0deg);
      }

      50% {
        transform: translateY(-22px) rotate(1deg);
      }
    }

    .header {
      margin-bottom: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 25px;
      animation: floatHeader 4s ease-in-out infinite;
    }

    @keyframes floatHeader {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    .siren {
      font-size: 62px;
      filter: drop-shadow(0 0 30px #f43f5e);
      animation: sirenBob 2.8s ease-in-out infinite;
    }

    @keyframes sirenBob {

      0%,
      100% {
        transform: scale(1) rotate(-6deg);
      }

      50% {
        transform: scale(1.08) rotate(6deg);
      }
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -1.5px;
      background: linear-gradient(90deg, #60a5fa, #c026d3, #f43f5e);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .instruction {
      font-size: 21px;
      font-weight: 500;
      margin-bottom: 65px;
      opacity: 0.92;
    }

    .hold-wrapper {
      position: relative;
      width: 235px;
      height: 235px;
      margin: 0 auto 75px;
      animation: floatHold 5s ease-in-out infinite;
    }

    @keyframes floatHold {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-28px) rotate(4deg);
      }
    }

    /* HOLD button with automatic color cycling */
    .hold-circle {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 37px;
      font-weight: 700;
      letter-spacing: -1.2px;
      color: #f1f5f9;
      cursor: pointer;
      user-select: none;
      box-shadow:
        0 0 75px rgba(0, 0, 0, 0.6),
        inset 0 28px 45px rgba(255, 255, 255, 0.22),
        inset 0 -28px 45px rgba(0, 0, 0, 0.65);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2;
      position: relative;
      overflow: hidden;
      animation: colorCycle 4s linear infinite;
      /* Green ↔ Violet when idle */
    }

    @keyframes colorCycle {
      0% {
        background: linear-gradient(135deg, #10b981, #6b21a8);
      }

      50% {
        background: linear-gradient(135deg, #6b21a8, #10b981);
      }

      100% {
        background: linear-gradient(135deg, #10b981, #6b21a8);
      }
    }

    .hold-circle::before {
      content: '';
      position: absolute;
      inset: -50%;
      background: radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.35), transparent 60%);
      opacity: 0.7;
    }

    /* When pressing → Red */
    .hold-circle:active {
      animation: none;
      background: linear-gradient(135deg, #ef4444, #b91c1c) !important;
      transform: scale(0.84) translateY(6px);
      box-shadow: 0 0 65px rgba(239, 68, 68, 0.95);
    }

    .hold-circle:active::before {
      opacity: 1;
      transform: scale(1.1);
    }

    .haptic-icon {
      position: absolute;
      bottom: -52px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 30px;
      opacity: 0.9;
      animation: hapticFloat 2s ease-in-out infinite;
      z-index: 3;
    }

    @keyframes hapticFloat {

      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(-8px);
      }
    }

    .stop-btn {
      padding: 17px 46px;
      font-size: 17.5px;
      font-weight: 700;
      background: linear-gradient(90deg, #e11d48, #f43f5e);
      color: white;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 18px 35px -8px rgba(225, 29, 72, 0.55);
      transition: all 0.3s;
    }

    .stop-btn:hover {
      transform: translateY(-3px);
    }

    .back-btn {
      position: absolute;
      top: 35px;
      left: 40px;
      background: rgba(255, 255, 255, 0.13);
      border: none;
      color: white;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 16px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    /* ========================= */
    /*  STATUS MESSAGE            */
    /* ========================= */

    #emergencyStatus {
      margin-top: 30px;
      padding: 0 20px;
      font-size: 16px;
      font-weight: 600;
      min-height: 30px;
      z-index: 3;
      transition: opacity 0.4s ease;
    }

    #emergencyStatus.success {
      color: #4ade80;
      text-shadow: 0 0 12px rgba(74, 222, 128, 0.5);
    }

    #emergencyStatus.error {
      color: #f87171;
      text-shadow: 0 0 12px rgba(248, 113, 113, 0.5);
    }

    #emergencyStatus.pending {
      color: #facc15;
      text-shadow: 0 0 12px rgba(250, 204, 21, 0.5);
    }

    /* ========================= */
    /*  MAP SECTION               */
    /* ========================= */

    .map-section {
      width: 100%;
      max-width: 920px;
      margin-top: 30px;
      z-index: 2;
      display: none;
    }

    .map-section.visible {
      display: block;
      animation: fadeSlideUp 0.6s ease;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .map-header {
      text-align: center;
      margin-bottom: 15px;
    }

    .map-header h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(90deg, #f43f5e, #facc15);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .map-header p {
      font-size: 13px;
      opacity: 0.65;
      margin-top: 5px;
    }

    #emergencyMap {
      width: 100%;
      height: 350px;
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid rgba(244, 63, 94, 0.5);
      box-shadow: 0 0 40px rgba(244, 63, 94, 0.3), 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 36px;
      }

      .hold-wrapper {
        width: 180px;
        height: 180px;
      }

      .hold-circle {
        font-size: 28px;
      }

      #emergencyMap {
        height: 280px;
        border-radius: 15px;
      }

      .container {
        padding: 30px 15px;
        border-radius: 30px;
        margin: 0 10px;
      }

      .map-section {
        margin: 20px 10px 0;
      }
    }
  </style>
</head>

<body>

  <button class="back-btn" onclick="history.back()">← Back</button>

  <div class="container">
    <div class="header">
      <span class="siren">🚨</span>
      <h1>EMERGENCY MODE</h1>
      <span class="siren">🚨</span>
    </div>

    <div class="instruction">
      Hold the circle to activate emergency
    </div>

    <div class="hold-wrapper">
      <div id="holdCircle" class="hold-circle">
        HOLD
      </div>
      <div class="haptic-icon">📳</div>
    </div>

    <button id="stopAlarm" class="stop-btn">
      STOP ALARM
    </button>

    <div id="emergencyStatus"></div>
  </div>

  <!-- MAP SECTION -->
  <div class="map-section" id="mapSection">
    <div class="map-header">
      <h2>📍 Your Location</h2>
      <p>This map has been shared with nearby Echozone users</p>
    </div>
    <div id="emergencyMap"></div>
  </div>

  <!-- Your audio.mp3 is connected here -->
  <audio id="emergencySound" src="alert_v2.mp3" preload="auto"></audio>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="emergency.js"></script>
</body>

</html>
